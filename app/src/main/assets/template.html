<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: 'Courier Prime', 'Courier New', monospace;
      font-size: 15px;
      line-height: 1.65;
      padding: 16px;
      margin: 0;
      word-wrap: break-word;
    }
    .user {
      text-align: left;
      color: #FFAB40;
      font-size: 17px;
      margin: 24px 0 8px 0;
      padding-left: 0;
      padding-right: 12px;
      border-right: 2px solid #6b4400;
    }
    .assistant {
      text-align: left;
      margin: 16px 0;
      padding-right: 8px;
    }
    .assistant p { margin: 0 0 10px 0; }
    .assistant p:last-child { margin-bottom: 0; }
    .katex-display { margin: 14px 0; overflow-x: auto; }
    .mermaid {
      margin: 14px 0;
      background: #090909;
      border: 1px solid #1f1f1f;
      padding: 12px;
    }
    .plot-wrap {
      margin: 14px 0;
      background: #090909;
      border: 1px solid #1f1f1f;
      padding: 4px;
    }
    .functionplot-data { display: none; }
    svg { max-width: 100%; }
    .function-plot .x.axis line,
    .function-plot .y.axis line       { stroke: #555; }
    .function-plot .x.axis path,
    .function-plot .y.axis path       { stroke: #555; }
    .function-plot text               { fill: #bbb; font-family: 'Courier Prime', monospace; font-size: 11px; }
    .function-plot .title             { fill: #fff; font-size: 13px; font-weight: bold; }
    .function-plot .x.axis .tick text,
    .function-plot .y.axis .tick text { fill: #ccc; font-size: 10px; }
    .function-plot .graph path.line   { stroke-width: 2px; }
    .error-msg { color: #ff5555; font-size: 0.9em; }
  </style>
</head>
<body id="chat">

<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script src="file:///android_asset/d3.min.js"></script>
<script src="file:///android_asset/function-plot.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({
    startOnLoad: false,
    theme: 'dark',
    themeVariables: {
      background: '#000',
      primaryColor: '#111',
      primaryTextColor: '#fff',
      lineColor: '#444',
      edgeLabelBackground: '#000'
    }
  });

  var messageQueue = [];
  var isReady = false;
  var plotCount = 0;
  var paletteIdx = 0;
  var PALETTE = ['#FFAB40','#4FC3F7','#81C784','#F06292','#CE93D8','#FFD54F'];

  // Compile a math expression string to a JS function, bypassing function-plot's parser.
  // Handles: ^ (power), pi, e, exp, sqrt, ln, log, sin, cos, tan, abs, and all Math.*
  function _sampleFn(fnStr, xDomain, nPts) {
    var decls = 'var pi=Math.PI,PI=Math.PI,e=Math.E,E=Math.E,tau=2*Math.PI,' +
      'phi=1.6180339887,inf=Infinity,infinity=Infinity,' +
      'exp=Math.exp,sqrt=Math.sqrt,cbrt=Math.cbrt,abs=Math.abs,' +
      'sin=Math.sin,cos=Math.cos,tan=Math.tan,sec=function(x){return 1/Math.cos(x)},' +
      'asin=Math.asin,acos=Math.acos,atan=Math.atan,atan2=Math.atan2,' +
      'sinh=Math.sinh,cosh=Math.cosh,tanh=Math.tanh,' +
      'log=Math.log10,ln=Math.log,log2=Math.log2,log10=Math.log10,' +
      'ceil=Math.ceil,floor=Math.floor,round=Math.round,' +
      'pow=Math.pow,sign=Math.sign,min=Math.min,max=Math.max;';
    var jsExpr = fnStr.replace(/\^/g, '**');
    var f;
    try { f = new Function('x', decls + 'return (' + jsExpr + ');'); } catch(e) { return null; }
    var x0 = xDomain[0], x1 = xDomain[1], step = (x1 - x0) / nPts;
    var pts = [];
    for (var i = 0; i <= nPts; i++) {
      var x = x0 + i * step;
      try { var y = f(x); if (isFinite(y)) pts.push([x, y]); } catch(e) {}
    }
    return pts.length > 1 ? pts : null;
  }

  function _renderMessage(role, html) {
    var div = document.createElement('div');
    div.className = role;
    div.innerHTML = html;
    document.getElementById('chat').appendChild(div);

    renderMathInElement(div, {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '$', right: '$', display: false }
      ],
      throwOnError: false
    });

    div.querySelectorAll('.mermaid').forEach(function(d) {
      var src = d.textContent.trim();
      mermaid.parse(src).then(function() {
        mermaid.run({ nodes: [d], suppressErrors: true });
      }).catch(function() {
        d.innerHTML = '<span class="error-msg">[diagram syntax error]</span>';
      });
    });

    var plotDivs = div.querySelectorAll('.functionplot-data');
    plotDivs.forEach(function(pd) {
      try {
        var cfg = JSON.parse(pd.textContent.trim());
        var plotId = 'plot-' + (++plotCount);
        var plotDiv = document.createElement('div');
        plotDiv.id = plotId;
        plotDiv.className = 'plot-wrap';
        pd.parentNode.insertBefore(plotDiv, pd);
        cfg.target = '#' + plotId;
        if (!cfg.width) cfg.width = Math.min(document.body.clientWidth - 32, 340);
        if (!cfg.height) cfg.height = 200;
        if (cfg.data) {
          var xDom = (cfg.xAxis && cfg.xAxis.domain) || [-10, 10];
          cfg.data.forEach(function(datum) {
            if (!datum.color) { datum.color = PALETTE[paletteIdx % PALETTE.length]; paletteIdx++; }
            if (typeof datum.fn === 'string') {
              var pts = _sampleFn(datum.fn, xDom, 300);
              if (pts) {
                datum.points = pts;
                datum.fnType = 'points';
                datum.graphType = 'polyline';
                delete datum.fn;
              }
            }
          });
        }
        functionPlot(cfg);
      } catch(e) {
        pd.innerHTML = '<span class="error-msg">[graph error: ' + e.message + ']</span>';
        pd.style.display = 'block';
      }
    });

    window.scrollTo(0, document.body.scrollHeight);
  }

  function appendMessage(role, html) {
    if (!isReady) {
      messageQueue.push({ role: role, html: html });
      return;
    }
    _renderMessage(role, html);
  }

  window.addEventListener('load', function() {
    isReady = true;
    messageQueue.forEach(function(m) { _renderMessage(m.role, m.html); });
    messageQueue = [];
  });
</script>
</body>
</html>
